[package]
name = "tei-serve"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Axum HTTP API for tei-fabric — exposes the cost-surface dispatcher over JSON."

[[bin]]
name = "tei-serve"
path = "src/main.rs"

[dependencies]
tei-stack.workspace = true
tei-ir.workspace = true
tei-nir.workspace = true
tei-substrate-traits.workspace = true
tei-cost-surface.workspace = true
tei-import.workspace = true
tei-sim-core.workspace = true
tei-sim-stochastic.workspace = true
tei-sim-spiking.workspace = true
tei-sim-crossbar.workspace = true
tei-sim-photonic.workspace = true
tei-sim-gaussian.workspace = true
tei-sim-circuit.workspace = true
tei-sim-field = { workspace = true, features = ["gpu-pack"] }
tei-sim-adiabatic.workspace = true
tei-d-stochastic.workspace = true
tei-d-neuromorphic.workspace = true
tei-d-in-memory.workspace = true
tei-d-photonic.workspace = true
tei-d-reversible.workspace = true
tei-forge = { path = "../../crates/tei-forge" }

tokio.workspace = true
axum.workspace = true
tower-http.workspace = true
futures = "0.3"
async-stream = "0.3"
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
