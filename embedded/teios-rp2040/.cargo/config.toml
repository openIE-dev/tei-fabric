# Staged copy of .cargo/config.toml — move into place with:
#   mkdir -p .cargo && mv cargo-config-staged.toml .cargo/config.toml
# (Purely convenience: default target + `cargo run` flashing. Every
# command in the README also works without it via explicit --target.)

[build]
target = "thumbv6m-none-eabi"

[target.'cfg(all(target_arch = "arm", target_os = "none"))']
# `picotool load -u -v -x -t elf` flashes and reboots a BOOTSEL-mode RP2040.
runner = "picotool load -u -v -x -t elf"
