[package]
name = "tei-sim-field"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "tei-sim field column — see docs/SIM-ROADMAP.md."

[dependencies]
tei-sim-core = { path = "../tei-sim-core" }
# F2 handoff target: extracted S-parameters become photonic circuit
# components. The dependency is one-way (field → photonic); the photonic
# crate stays FDTD-free.
tei-sim-photonic = { path = "../tei-sim-photonic" }
serde.workspace = true
serde_json.workspace = true
# F3: slab-parallel 3D updates (fixed slab boundaries, no reductions —
# results are bit-identical at any thread count).
rayon.workspace = true
# F4 (feature `gpu`, native host only): the WGSL kernels in src/gpu/shaders/
# are the shared artifact; a browser JS WebGPU driver reuses them verbatim.
# The default build stays free of these dependencies.
wgpu = { version = "29", optional = true }
pollster = { version = "0.4", optional = true }
bytemuck = { version = "1", features = ["derive"], optional = true }

[features]
gpu-pack = ["dep:bytemuck"]
gpu = ["gpu-pack", "dep:wgpu", "dep:pollster"]
